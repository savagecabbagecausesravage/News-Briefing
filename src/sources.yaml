# Daily News Briefing — Source Configuration
# Categories map to display sections; weight determines relative coverage

categories:
  world_and_markets:
    display_name: "World & Markets"
    weight: 0.40
    subsections:
      - "Top Headlines"
      - "US-China Relations"
      - "Financial Markets"
      - "Science & Technology Breakthroughs"

  ai_and_technology:
    display_name: "AI & Technology"
    weight: 0.30  # 50% of 60% professional
    subsections:
      - "Research & Papers"
      - "Industry News"
      - "Key People & Company Updates"

  private_equity_and_vc:
    display_name: "Private Equity & VC"
    weight: 0.18  # 30% of 60% professional
    subsections:
      - "Deals & Fundraising"
      - "Fund News & Trends"

  fintech:
    display_name: "Fintech"
    weight: 0.12  # 20% of 60% professional
    subsections:
      - "Platforms & Products"
      - "Regulation"

