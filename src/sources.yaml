# NewsAPI queries — for sources without RSS feeds
newsapi_queries:
  - query: "Anthropic AI"
    category: "ai_and_technology"
    subsection: "Key People & Company Updates"

  - query: "private equity fundraising OR private equity deals"
    category: "private_equity_and_vc"
    subsection: "Deals & Fundraising"

  - query: "Sequoia Capital OR Andreessen Horowitz OR KKR OR Blackstone OR Apollo Global OR Carlyle OR TPG OR Thoma Bravo OR Silver Lake OR EQT Partners"
    category: "private_equity_and_vc"
    subsection: "Deals & Fundraising"

  - query: "US China relations OR US China trade OR US China technology"
    category: "world_and_markets"
    subsection: "US-China Relations"

  - query: "Andrej Karpathy OR Yann LeCun OR Andrew Ng OR Demis Hassabis OR Jeff Dean OR Jim Fan AI"
    category: "ai_and_technology"
    subsection: "Key People & Company Updates"

  - query: "ILPA OR CalPERS private equity OR sovereign wealth fund investment"
    category: "private_equity_and_vc"
    subsection: "Fund News & Trends"

  - query: "fintech regulation OR financial services technology"
    category: "fintech"
    subsection: "Regulation"

  - query: "Federal Reserve OR ECB OR Bank of England monetary policy"
    category: "world_and_markets"
    subsection: "Financial Markets"

  - query: "Stanford HAI artificial intelligence"
    category: "ai_and_technology"
    subsection: "Research & Papers"

