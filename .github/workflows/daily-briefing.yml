name: Deploy News Briefing

# Deploys whenever docs/index.html is updated (pushed by Claude Code trigger)
on:
  push:
    paths:
      - 'docs/index.html'
    branches:
      - main

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
